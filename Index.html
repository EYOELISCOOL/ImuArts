<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMUARTS · pure vision</title>
  <!-- Font Awesome 6 + modern fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      --bg: #f5f3f0;
      --surface: rgba(255, 255, 255, 0.8);
      --card-bg: rgba(255, 255, 255, 0.6);
      --text: #181815;
      --text-muted: #5f5b55;
      --border: rgba(160, 140, 120, 0.2);
      --gold: #b28b5c;
      --gold-light: #f0e2d2;
      --accent-deep: #3d6655;
      --shadow-sm: 0 20px 35px -20px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.02);
      --shadow-hover: 0 35px 50px -25px rgba(160, 110, 60, 0.4), 0 0 0 1px var(--gold);
      --hero-overlay: linear-gradient(130deg, rgba(10, 10, 10, 0.4) 0%, rgba(30, 20, 15, 0.6) 100%);
      --transition: all 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
      --glass: blur(20px) saturate(200%);
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      transition: background-color 0.4s, color 0.3s;
      line-height: 1.5;
    }

    body.dark {
      --bg: #181612;
      --surface: rgba(30, 27, 23, 0.85);
      --card-bg: rgba(40, 35, 30, 0.7);
      --text: #f0eae2;
      --text-muted: #bfb5a9;
      --border: rgba(200, 170, 140, 0.15);
      --gold: #cfaa7a;
      --gold-light: #685e51;
      --accent-deep: #619882;
      --shadow-sm: 0 20px 35px -20px #0f0d09, 0 0 0 1px rgba(200,170,140,0.1);
      --shadow-hover: 0 35px 50px -25px #1a150e, 0 0 0 1px var(--gold);
    }

    html { scroll-behavior: smooth; }
    ::selection { background: var(--gold); color: white; }

    /* app container */
    .app { width: 100%; overflow-x: hidden; }

    /* --- ultra-modern navbar --- */
    .navbar {
      position: sticky;
      top: 1.5rem;
      z-index: 100;
      margin: 0 2rem;
      background: var(--surface);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: 80px;
      padding: 0.7rem 2.2rem 0.7rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      box-shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
    }
    .logo {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      background: linear-gradient(145deg, var(--text) 20%, var(--gold) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      border-right: 1px solid var(--border);
      padding-right: 2rem;
      font-family: 'Space Grotesk', sans-serif;
    }
    .logo span { font-weight: 200; -webkit-text-fill-color: var(--gold); }
    
    .nav-links {
      display: flex;
      gap: 3rem;
      margin-left: 2rem;
    }
    .nav-links a {
      color: var(--text);
      text-decoration: none;
      font-weight: 380;
      font-size: 0.9rem;
      letter-spacing: 0px;
      text-transform: uppercase;
      position: relative;
      padding: 0.3rem 0;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.8;
    }
    .nav-links a i { color: var(--gold); font-size: 0.9rem; transition: transform 0.2s; }
    .nav-links a:hover i { transform: translateY(-3px); }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--gold);
      transition: width 0.3s;
    }
    .nav-links a:hover::after { width: 100%; }
    
    .right-actions {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .lang-toggle, .theme-toggle, .login-btn {
      background: transparent;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 380;
      transition: all 0.2s;
    }
    .lang-toggle i, .theme-toggle i { margin-right: 6px; color: var(--gold); }
    .login-btn {
      border: 1.5px solid var(--gold);
      padding: 0.4rem 2rem;
      border-radius: 60px;
      background: transparent;
    }
    .login-btn:hover {
      background: var(--gold);
      color: white;
      transform: scale(1.04);
      box-shadow: 0 8px 18px -8px var(--gold);
    }

    /* --- hero with video - NO COLOR FILTERS --- */
    .hero {
      width: 100%;
      height: 95vh;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0 0 50px 50px;
      margin-bottom: 2rem;
    }
    .hero-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* Perfect fit without distortion */
      z-index: 0;
      /* NO filter, brightness, saturate, etc. - completely original video colors */
    }
    .hero-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--hero-overlay);
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: white;
      max-width: 1200px;
      padding: 2rem;
      animation: fadeUp 1.5s ease-out;
    }
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .hero-content h1 {
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 300;
      letter-spacing: -2px;
      text-transform: uppercase;
      margin-bottom: 1rem;
      text-shadow: 0 4px 30px rgba(0,0,0,0.3);
      line-height: 1;
      font-family: 'Space Grotesk', sans-serif;
    }
    .hero-content h1 span { font-weight: 200; color: var(--gold); font-style: normal; }
    .hero-content p {
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 3rem;
      backdrop-filter: blur(4px);
      display: inline-block;
      padding: 0.5rem 2rem;
      border-radius: 60px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .cta-btn {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.8);
      color: white;
      padding: 1.2rem 5rem;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.4s;
      backdrop-filter: blur(8px);
      border-radius: 80px;
    }
    .cta-btn:hover {
      background: white;
      color: #1a1713;
      border-color: white;
      transform: scale(1.02);
      box-shadow: 0 30px 45px -15px black;
    }

    /* manifesto minimal */
    .manifesto {
      padding: 5rem 3rem 4rem;
      max-width: 1300px;
      margin: 0 auto;
      text-align: center;
    }
    .manifesto h2 {
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: -1px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2rem;
      font-family: 'Space Grotesk', sans-serif;
    }
    .manifesto p {
      font-size: 1.3rem;
      max-width: 900px;
      margin: 0 auto;
      color: var(--text-muted);
      line-height: 1.8;
      font-weight: 300;
    }

    /* artist grid modern */
    .featured-artists {
      padding: 5rem 3rem;
    }
    .section-title {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: -1px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 3rem;
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
    }
    .artist-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2.5rem;
      justify-content: center;
    }
    .artist-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 2rem 1.5rem;
      text-align: center;
      width: 220px;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }
    .artist-card:hover {
      transform: translateY(-12px);
      box-shadow: var(--shadow-hover);
      border-color: var(--gold);
    }
    .artist-avatar {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      color: var(--gold);
    }
    .artist-card h3 {
      font-weight: 400;
      font-size: 1.3rem;
      margin-bottom: 0.2rem;
    }
    .artist-card p {
      color: var(--text-muted);
      font-size: 0.8rem;
      letter-spacing: 0.5px;
    }

    /* exhibitions clean */
    .exhibitions {
      padding: 5rem 3rem;
    }
    .timeline {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
    }
    .exhibit-item {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 2rem;
      width: 280px;
      transition: var(--transition);
      text-align: left;
    }
    .exhibit-item:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
    }
    .exhibit-date {
      color: var(--gold);
      font-weight: 500;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .exhibit-title {
      font-size: 1.8rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }
    .exhibit-location {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* vision minimal */
    .vision-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4rem;
      padding: 6rem 3rem;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .vision-text {
      max-width: 550px;
    }
    .vision-text h3 {
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: -1px;
      color: var(--gold);
      margin-bottom: 1.2rem;
    }
    .vision-text p {
      color: var(--text-muted);
      font-size: 1.2rem;
      line-height: 1.8;
      font-weight: 300;
    }
    .vision-symbol {
      font-size: 10rem;
      color: var(--gold);
      opacity: 0.5;
    }

    /* newsletter modern */
    .newsletter {
      padding: 6rem 3rem;
      text-align: center;
    }
    .newsletter h3 {
      font-weight: 300;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 2rem;
      color: var(--gold);
      font-family: 'Space Grotesk', sans-serif;
    }
    .newsletter h3 span { color: var(--text); }
    .newsletter-form {
      display: flex;
      max-width: 550px;
      margin: 2.5rem auto 0;
      border-bottom: 2px solid var(--border);
      background: transparent;
      padding: 0;
    }
    .newsletter-form input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 1rem 0;
      color: var(--text);
      outline: none;
      font-size: 1.1rem;
    }
    .newsletter-form button {
      background: transparent;
      border: none;
      color: var(--gold);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 400;
    }

    /* footer */
    .footer {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      padding: 2.5rem 3rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* chat widget modern */
    .chat-widget {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 380px;
      background: var(--surface);
      backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      box-shadow: 0 30px 55px -20px #00000066;
      z-index: 200;
      border-radius: 40px 40px 20px 20px;
      overflow: hidden;
    }
    .chat-header {
      background: var(--card-bg);
      padding: 1.3rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .chat-body {
      max-height: 320px;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      padding: 0.9rem 1.3rem;
      max-width: 85%;
      border-radius: 24px 24px 4px 24px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      font-size: 0.95rem;
    }
    .message.bot { align-self: flex-start; background: var(--gold-light); color: var(--text); border-radius: 4px 24px 24px 24px; }
    .message.user { align-self: flex-end; background: var(--gold); color: white; border-radius: 24px 24px 4px 24px; }
    .chat-widget.collapsed .chat-body,
    .chat-widget.collapsed .chat-input-area { display: none; }

    @media (max-width: 800px) {
      .navbar { margin: 0 1rem; padding: 0.5rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="logo">IM<span>UARTS</span></div>
      <div class="nav-links">
        <a href="#" data-key="explore"><i class="fas fa-compass"></i> <span>Info</span></a>
        <a href="#" data-key="artistsNav"><i class="fas fa-user"></i> <span>Artists</span></a>
        <a href="#" data-key="exhibitionsNav"><i class="fas fa-calendar"></i> <span>Exhibitions</span></a>
        <a href="#" data-key="spaceNav"><i class="fas fa-vector-square"></i> <span>Space</span></a>
      </div>
      <div class="right-actions">
        <button class="lang-toggle" id="langToggle"><i class="fas fa-language"></i> <span id="langLabel">EN</span></button>
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
        <button class="login-btn" id="loginBtn" data-key="login">Enter</button>
      </div>
    </nav>

    <!-- HERO - VIDEO WITH ABSOLUTELY NO COLOR FILTERS -->
    <section class="hero">
      <video class="hero-video" autoplay muted loop playsinline>
        <source src="./Hero.mp4" type="video/mp4">
      </video>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 id="heroTitle">SPACE <span>&</span> TIME</h1>
        <p id="heroSub">gallery · light · void</p>
        <button class="cta-btn" id="heroBtn" data-key="heroCta">explore</button>
      </div>
    </section>

    <!-- NEWSLETTER -->
    <div class="newsletter">
      <h3><span id="newsletterSpan">NEWSLETTER</span> <span>—</span> <span id="newsletterEn">NEWSLETTER</span></h3>
      <div class="newsletter-form">
        <input type="email" id="newsEmail" data-key="newsPlaceholder" placeholder="your email">
        <button id="newsBtn" data-key="subscribe">send</button>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-links">
        <a href="#" data-key="terms">space</a>
        <a href="#" data-key="privacy">time</a>
        <a href="#" data-key="faq">light</a>
      </div>
      <div id="footerCopy">© 2025 IMUARTS — infinite</div>
      <div class="socials">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-pinterest"></i></a>
        <a href="#"><i class="fab fa-x-twitter"></i></a>
      </div>
    </footer>
  </div>

 

  <script>
    (function() {
      // language dictionary (NL/EN) - start with english
      const lang = {
        en: {
          explore: 'Info', artistsNav: 'Artists', exhibitionsNav: 'Exhibitions', spaceNav: 'Space',
          login: 'Enter',
          heroTitle: 'SPACE <span>&</span> TIME', heroSub: 'gallery · light · void', heroCta: 'explore',
          manifestoTitle: 'No collection, no border',
          manifestoText: 'IMUARTS is a liquid space. No objects, only encounters. Light, sound and ideas become the works. Every second the exhibition changes. The void breathes with the visitor.',
          artistTitle: 'ARTISTS OF THE INVISIBLE',
          exhTitle: 'UPCOMING MANIFESTATIONS',
          visionTitle: 'Space is the work',
          visionText: 'Each visitor creates their own IMUARTS. Walls disappear, light becomes brush. Artists lend their vision, but the void remains the true curator.',
          newsletterSpan: 'NEWSLETTER', newsletterEn: 'NEWSLETTER',
          newsPlaceholder: 'your email', subscribe: 'send',
          terms: 'space', privacy: 'time', faq: 'light',
          chatTitle: 'AI guide', welcomeMsg: 'I am the voice of IMUARTS. Ask me about exhibitions, artists, light, or silence.',
          chatPlaceholder: 'ask me...',
        },
        nl: {
          explore: 'Info', artistsNav: 'Kunstenaars', exhibitionsNav: 'Exposities', spaceNav: 'Ruimte',
          login: 'Betreed',
          heroTitle: 'RUIMTE <span>&</span> TĲD', heroSub: 'galerie · licht · leegte', heroCta: 'verken',
          manifestoTitle: 'Zonder collectie, zonder grens',
          manifestoText: 'IMUARTS is een vloeibare ruimte. Geen objecten, slechts ontmoetingen. Licht, geluid en ideeën worden de werken. Elke seconde verandert de expositie. De leegte ademt met de bezoeker.',
          artistTitle: 'KUNSTENAARS VAN HET ONZICHTBARE',
          exhTitle: 'KOMENDE VERSCHIJNINGEN',
          visionTitle: 'Ruimte is het werk',
          visionText: 'Elke bezoeker creëert zijn eigen IMUARTS. Muren verdwijnen, licht wordt penseel. Kunstenaars lenen hun visie, maar de leegte blijft de ware curator.',
          newsletterSpan: 'NIEUWSBRIEF', newsletterEn: 'NIEUWSBRIEF',
          newsPlaceholder: 'uw e-mail', subscribe: 'verstuur',
          terms: 'ruimte', privacy: 'tijd', faq: 'licht',
          chatTitle: 'AI gids', welcomeMsg: 'Ik ben de stem van IMUARTS. Vraag naar exposities, kunstenaars, licht of stilte.',
          chatPlaceholder: 'vraag me...',
        }
      };
      let currentLang = 'en'; // start with english

      function applyLanguage(langCode) {
        const texts = lang[langCode];
        document.querySelectorAll('[data-key]').forEach(el => {
          const key = el.getAttribute('data-key');
          if (texts[key]) {
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = texts[key];
            else el.innerText = texts[key];
          }
        });
        // manual overrides
        document.getElementById('heroTitle').innerHTML = texts.heroTitle;
        document.getElementById('heroSub').innerText = texts.heroSub;
        document.getElementById('heroBtn').innerText = texts.heroCta;
        document.getElementById('manifestoTitle').innerText = texts.manifestoTitle;
        document.getElementById('manifestoText').innerText = texts.manifestoText;
        document.querySelector('#artistTitle span').innerText = texts.artistTitle;
        document.querySelector('#exhTitle span').innerText = texts.exhTitle;
        document.getElementById('visionTitle').innerText = texts.visionTitle;
        document.getElementById('visionText').innerText = texts.visionText;
        document.getElementById('newsletterSpan').innerText = texts.newsletterSpan;
        document.getElementById('newsletterEn').innerText = texts.newsletterEn;
        document.getElementById('langLabel').innerText = langCode === 'nl' ? 'NL' : 'EN';
        document.getElementById('loginBtn').innerText = texts.login;
        document.getElementById('chatTitle').innerText = texts.chatTitle;
        document.getElementById('welcomeMsg').innerText = texts.welcomeMsg;
        document.getElementById('chatInput').placeholder = texts.chatPlaceholder;
      }

      // theme toggle
      const themeBtn = document.getElementById('themeToggle');
      themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        themeBtn.innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
      });

      // language toggle (now starts EN, toggles to NL)
      document.getElementById('langToggle').addEventListener('click', () => {
        currentLang = currentLang === 'en' ? 'nl' : 'en';
        applyLanguage(currentLang);
      });

      // chat logic
      const chatWidget = document.getElementById('chatWidget');
      const chatHeader = document.getElementById('chatHeader');
      const toggleIcon = document.getElementById('toggleChatIcon');
      const chatBody = document.getElementById('chatBody');
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendChat');

      chatHeader.addEventListener('click', () => {
        chatWidget.classList.toggle('collapsed');
        toggleIcon.className = chatWidget.classList.contains('collapsed') ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
      });

      function addMessage(text, sender) {
        const msg = document.createElement('div');
        msg.classList.add('message', sender);
        msg.textContent = text;
        chatBody.appendChild(msg);
        chatBody.scrollTop = chatBody.scrollHeight;
      }

      function botReply(userMsg) {
        const lower = userMsg.toLowerCase();
        let reply = '';

        if (lower.includes('exhibit') || lower.includes('exhibition') || lower.includes('manifestation') || lower.includes('tentoon')) {
          reply = currentLang === 'en' 
            ? 'Upcoming: "Silence light" (June 21, The Hague), "Border of echo" (Aug 9, Amsterdam), "Matter & dream" (Oct 2, Brussels).'
            : 'Binnenkort: "Stilte‑licht" (21 juni, Den Haag), "Grens van echo" (9 aug, Amsterdam), "Materie & droom" (2 okt, Brussel).';
        } else if (lower.includes('artist') || lower.includes('kunstenaar')) {
          reply = currentLang === 'en' 
            ? 'Elara Dewinter (light), Samuel Nkosi (video), Linde Vogel (sound), Hiro Tanaka (kinetic).'
            : 'Elara Dewinter (licht), Samuel Nkosi (video), Linde Vogel (geluid), Hiro Tanaka (kinetisch).';
        } else if (lower.includes('space') || lower.includes('ruimte') || lower.includes('void') || lower.includes('leegte')) {
          reply = currentLang === 'en'
            ? 'The space is empty and breathing. No permanent objects, only changing light and encounter.'
            : 'De ruimte is leeg en ademend. Geen vaste objecten, alleen veranderend licht en ontmoeting.';
        } else if (lower.includes('light') || lower.includes('licht')) {
          reply = currentLang === 'en'
            ? 'Light is the brush of IMUARTS. Each exhibition redefines atmosphere with light sculptures.'
            : 'Licht is het penseel van IMUARTS. Elke expositie herdefinieert de atmosfeer met lichtsculpturen.';
        } else if (lower.includes('hello') || lower.includes('hi') || lower.includes('hallo')) {
          reply = currentLang === 'en' 
            ? 'Welcome. I am the AI guide. Ask me about exhibitions, artists, or the philosophy.'
            : 'Welkom. Ik ben de AI gids. Vraag naar exposities, kunstenaars of de filosofie.';
        } else {
          reply = currentLang === 'en'
            ? 'Silence answers. Ask about artists, upcoming exhibitions, or the light.'
            : 'De stilte antwoordt. Vraag naar kunstenaars, komende exposities of het licht.';
        }
        addMessage(reply, 'bot');
      }

      sendBtn.addEventListener('click', () => {
        const txt = chatInput.value.trim();
        if (!txt) return;
        addMessage(txt, 'user');
        chatInput.value = '';
        setTimeout(() => botReply(txt), 600);
      });

      chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });

      // parallax - only translation, no scaling or filters
      const heroVideo = document.querySelector('.hero-video');
      window.addEventListener('scroll', () => {
        if (heroVideo) heroVideo.style.transform = `translateY(${window.scrollY * 0.1}px)`;
      });

      // initial language (english)
      applyLanguage('en');
    })();
  </script>
</body>
</html>
